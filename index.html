        function init() {
            const mSelect = document.getElementById('monthFilter');
            const aSelect = document.getElementById('accountFilter');
            mSelect.innerHTML = '<option value="All">All Months</option>';
            aSelect.innerHTML = '<option value="All">All Accounts</option>';

            const uniqueMonths = [...new Set(rawData.map(i => i.month))].sort((a,b) => monthOrderMap[a] - monthOrderMap[b]);
            const uniqueAccounts = [...new Set(rawData.map(i => i.account))].sort();
            
            uniqueMonths.forEach(m => mSelect.add(new Option(m, m)));
            uniqueAccounts.forEach(acc => aSelect.add(new Option(acc, acc)));
            
            updateDashboard();
        }

        function toggleSort(key) {
            if (currentSort.key === key) currentSort.order = currentSort.order === 'asc' ? 'desc' : 'asc';
            else { currentSort.key = key; currentSort.order = 'desc'; }
            renderTable();
        }

        function updateDashboard() {
            const mVal = document.getElementById('monthFilter').value;
            const aVal = document.getElementById('accountFilter').value;
            const viewIndicator = document.getElementById('viewIndicator');

            let filtered = rawData.filter(i => (mVal === "All" || i.month === mVal) && (aVal === "All" || i.account === aVal));

            if (aVal !== "All" && mVal === "All") {
                processedData = filtered.map(i => ({...i, label: i.month, subLabel: i.account}));
                processedData.sort((a,b) => monthOrderMap[a.label] - monthOrderMap[b.label]);
                currentSort = { key: 'label', order: 'asc' };
                viewIndicator.innerText = `Growth Trend: ${aVal}`;
            } 
            else if (mVal !== "All" && aVal === "All") {
                processedData = filtered.map(i => ({...i, label: i.account, subLabel: i.month}));
                currentSort = { key: 'spent', order: 'desc' };
                viewIndicator.innerText = `Overview for ${mVal}`;
            }
            else if (mVal === "All" && aVal === "All") {
                const grouped = filtered.reduce((acc, item) => {
                    if (!acc[item.account]) acc[item.account] = { account: item.account, spent: 0, impressions: 0, clicks: 0, month: "LifeTime" };
                    acc[item.account].spent += item.spent;
                    acc[item.account].impressions += item.impressions;
                    acc[item.account].clicks += item.clicks;
                    return acc;
                }, {});
                processedData = Object.values(grouped).map(i => ({...i, label: i.account, subLabel: i.month}));
                currentSort = { key: 'spent', order: 'desc' };
                viewIndicator.innerText = "Global Account Overview";
            }
            else {
                processedData = filtered.map(i => ({...i, label: i.account, subLabel: i.month}));
            }

            processedData.forEach(i => {
                i.cpmVal = i.impressions > 0 ? (i.spent / i.impressions) * 1000 : 0;
                i.cpcVal = i.clicks > 0 ? (i.spent / i.clicks) : 0;
            });

            updateKPIs();
            renderTable();
            renderChart();
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            const dataToSort = [...processedData];

            dataToSort.sort((a, b) => {
                let valA = a[currentSort.key], valB = b[currentSort.key];
                if (currentSort.key === 'label') {
                    const orderA = monthOrderMap[valA] || 0;
                    const orderB = monthOrderMap[valB] || 0;
                    if (orderA !== 0 && orderB !== 0) {
                        return currentSort.order === 'asc' ? orderA - orderB : orderB - orderA;
                    }
                }
                return currentSort.order === 'asc' ? (valA > valB ? 1 : -1) : (valA < valB ? 1 : -1);
            });

            tbody.innerHTML = '';
            dataToSort.forEach(item => {
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 transition-all">
                        <td class="px-6 py-4">
                            <div class="font-bold text-slate-800 text-[11px]">${item.label}</div>
                            <div class="text-[9px] font-semibold text-slate-400 uppercase tracking-tighter">${item.subLabel}</div>
                        </td>
                        <td class="px-6 py-4 text-right font-bold text-slate-700 text-[11px]">₹${item.spent.toLocaleString('en-IN')}</td>
                        <td class="px-6 py-4 text-right text-[11px] text-slate-500 font-medium">${item.impressions.toLocaleString()}</td>
                        <td class="px-6 py-4 text-right text-[11px] text-slate-500 font-medium">${item.clicks.toLocaleString()}</td>
                        <td class="px-6 py-4 text-right">
                            <span class="bg-indigo-50 text-indigo-700 border border-indigo-100 px-3 py-1 rounded-full text-[10px] font-bold">${item.cpmVal.toFixed(2)}</span>
                        </td>
                        <td class="px-6 py-4 text-right">
                            <span class="bg-emerald-50 text-emerald-700 border border-emerald-100 px-3 py-1 rounded-full text-[10px] font-bold">${item.cpcVal.toFixed(2)}</span>
                        </td>
                    </tr>`;
            });
        }

        function updateKPIs() {
            const tSpent = processedData.reduce((s, i) => s + i.spent, 0);
            const tImp = processedData.reduce((s, i) => s + i.impressions, 0);
            const tClick = processedData.reduce((s, i) => s + i.clicks, 0);
            document.getElementById('totalSpent').innerText = '₹' + tSpent.toLocaleString('en-IN');
            document.getElementById('totalImpressions').innerText = tImp.toLocaleString('en-IN');
            document.getElementById('totalClicks').innerText = tClick.toLocaleString('en-IN');
            document.getElementById('avgCPM').innerText = tImp > 0 ? ((tSpent / tImp) * 1000).toFixed(2) : "0.00";
            document.getElementById('avgCPC').innerText = tClick > 0 ? (tSpent / tClick).toFixed(2) : "0.00";
        }

        function renderChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if (mainChart) mainChart.destroy();
            
            mainChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: processedData.map(i => i.label),
                    datasets: [
                        { 
                            label: 'CPM', 
                            data: processedData.map(i => i.cpmVal), 
                            backgroundColor: '#6366f1', 
                            borderRadius: 4,
                            datalabels: { align: 'top', anchor: 'end' }
                        },
                        { 
                            label: 'CPC', 
                            data: processedData.map(i => i.cpcVal), 
                            backgroundColor: '#10b981', 
                            borderRadius: 4,
                            datalabels: { align: 'top', anchor: 'end' }
                        }
                    ]
                },
                options: {
                    maintainAspectRatio: false,
                    layout: {
                        padding: { top: 30 } // Labels ke liye upar jagah chodi hai
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: { enabled: true },
                        datalabels: {
                            color: '#475569',
                            font: { family: 'Outfit', weight: '700', size: 10 },
                            formatter: (value) => value.toFixed(2),
                            padding: 4
                        }
                    },
                    scales: {
                        x: { grid: { display: false }, ticks: { font: { family: 'Outfit', size: 9, weight: '600' } } },
                        y: { 
                            grid: { borderDash: [5, 5], color: '#e2e8f0' }, 
                            ticks: { font: { family: 'Outfit', size: 9 } },
                            grace: '15%' // Ensures labels don't get cut off at the top
                        }
                    }
                }
            });
        }

        init();
    </script>
</body>
</html>
