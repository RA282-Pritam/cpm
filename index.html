        let cpmChart;

        function initDynamicFilters() {
            const monthSelect = document.getElementById('monthFilter');
            const accountSelect = document.getElementById('accountFilter');

            const uniqueMonths = [...new Set(rawData.map(item => item.month))].sort((a,b) => monthOrder[a] - monthOrder[b]);
            uniqueMonths.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m; opt.innerText = m;
                monthSelect.appendChild(opt);
            });

            const uniqueAccounts = [...new Set(rawData.map(item => item.account))].sort();
            uniqueAccounts.forEach(acc => {
                const opt = document.createElement('option');
                opt.value = acc; opt.innerText = acc;
                accountSelect.appendChild(opt);
            });

            updateDashboard();
        }

        function updateDashboard() {
            const mVal = document.getElementById('monthFilter').value;
            const aVal = document.getElementById('accountFilter').value;
            const axisLabel = document.getElementById('axisLabel');

            let filtered = rawData.filter(i => (mVal === "All" || i.month === mVal) && (aVal === "All" || i.account === aVal));

            let displayData = [];
            let isProjectView = (aVal !== "All" && mVal === "All");

            if (isProjectView) {
                displayData = filtered; 
                axisLabel.innerText = "Trend: Month-over-Month";
                displayData.sort((a, b) => monthOrder[a.month] - monthOrder[b.month]);
            } else if (mVal === "All") {
                const grouped = filtered.reduce((acc, item) => {
                    if (!acc[item.account]) acc[item.account] = { account: item.account, spent: 0, impressions: 0, month: "LifeTime" };
                    acc[item.account].spent += item.spent;
                    acc[item.account].impressions += item.impressions;
                    return acc;
                }, {});
                displayData = Object.values(grouped);
                axisLabel.innerText = "Grouping: Account";
            } else {
                displayData = filtered;
                axisLabel.innerText = "Grouping: Account";
            }

            displayData.forEach(i => i.cpmVal = i.impressions > 0 ? (i.spent / i.impressions) * 1000 : 0);
            
            if (!isProjectView) {
                displayData.sort((a, b) => b.cpmVal - a.cpmVal);
            }

            const tSpent = displayData.reduce((s, i) => s + i.spent, 0);
            const tImp = displayData.reduce((s, i) => s + i.impressions, 0);
            document.getElementById('totalSpent').innerText = '₹' + tSpent.toLocaleString('en-IN');
            document.getElementById('totalImpressions').innerText = tImp.toLocaleString('en-IN');
            document.getElementById('avgCPM').innerText = tImp > 0 ? ((tSpent / tImp) * 1000).toFixed(2) : "0.00";

            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            displayData.forEach(item => {
                const label = isProjectView ? item.month : item.account;
                const subLabel = isProjectView ? item.account : item.month;
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 transition-all">
                        <td class="px-6 py-2.5">
                            <div class="font-bold text-slate-800 text-[10px]">${label}</div>
                            <div class="text-[8px] font-bold text-slate-400 uppercase tracking-tighter">${subLabel}</div>
                        </td>
                        <td class="px-6 py-2.5 text-right font-bold text-slate-600 text-[10px]">₹${item.spent.toLocaleString('en-IN')}</td>
                        <td class="px-6 py-2.5 text-right text-[10px] text-slate-400 font-medium">${item.impressions.toLocaleString()}</td>
                        <td class="px-6 py-2.5 text-right">
                            <span class="bg-indigo-600 text-white px-2.5 py-1 rounded-md text-[9px] font-black">${item.cpmVal.toFixed(2)}</span>
                        </td>
                    </tr>`;
            });

            const finalLabels = isProjectView 
                ? displayData.map(i => i.month) 
                : displayData.map(i => i.account.length > 12 ? i.account.substring(0,12)+'..' : i.account);

            renderCPMChart(finalLabels, displayData.map(i => i.cpmVal));
        }

        function renderCPMChart(labels, values) {
            if (cpmChart) cpmChart.destroy();
            cpmChart = new Chart(document.getElementById('cpmChart'), {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        backgroundColor: '#6366f1',
                        borderRadius: 5,
                        barThickness: 20
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { display: false }, ticks: { font: { size: 8, weight: 'bold' } } },
                        y: { grid: { color: '#f1f5f9' }, ticks: { font: { size: 8 } } }
                    }
                }
            });
        }
